version: 1
applications:
  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - npm install -g pnpm@9.14.2
            - cd $CODEBUILD_SRC_DIR/rosteriq
            - pnpm install
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/rosteriq/apps/admin
            - pnpm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/admin/.next/cache/**/*
