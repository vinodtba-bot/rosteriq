# RosterIQ — Deploy to AWS (CDK)
# Requires: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION (or use OIDC)

name: Deploy to AWS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'services/**'
      - 'packages/**'
      - '.github/workflows/deploy-aws.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and Lambdas
        run: pnpm run build

      - name: CDK bootstrap (if needed)
        run: cd infrastructure/cdk && pnpm exec cdk bootstrap
        continue-on-error: true

      - name: CDK deploy
        run: cd infrastructure/cdk && pnpm run cdk:deploy
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
